---
- name: Cleanup hosts from Dynamic_Inventory
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    target_inventory: "Dynamic_Inventory"

  tasks:
    - name: Look up every host currently in the inventory
      ansible.builtin.set_fact:
        existing_hosts: >-
          {{ query('ansible.controller.controller_api',
                    'hosts',
                    query_params={'inventory__name': target_inventory, 'page_size': 200},  request_timeout=30) }}

    - name: Report what is about to be removed
      ansible.builtin.debug:
        msg: "{{ existing_hosts | length }} host(s) found in '{{ target_inventory }}' - removing them all"

    - name: Delete each host from the inventory
      ansible.controller.host:
        name: "{{ item.name }}"
        inventory: "{{ target_inventory }}"
        state: absent
        request_timeout: 30
      loop: "{{ existing_hosts }}"
      loop_control:
        label: "{{ item.name }}"
      ignore_errors: true

    - name: Confirm the inventory is now empty
      ansible.builtin.debug:
        msg: "Cleanup complete - '{{ target_inventory }}' should now have 0 hosts"
