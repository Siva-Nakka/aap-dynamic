---
- name: Register host and launch job
  hosts: localhost
  gather_facts: false

  vars:
    inventory_name: Dynamic_Inventory
    target_job_template: Linux Patch Job

  tasks:

    - name: Create host
      ansible.controller.host:
        inventory: "{{ inventory_name }}"
        name: "{{ target_ip }}"
        variables:
          ansible_host: "{{ target_ip }}"
        state: present
